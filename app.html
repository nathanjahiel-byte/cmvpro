<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Gestão financeira completa para restaurante — CMV, DRE, Despesas e Saldos">
<title>CMV Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#080808;--s1:#111111;--s2:#1A1A1A;--s3:#252525;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.12);
  --green:#10B981;--green-dim:rgba(16,185,129,0.12);
  --red:#EF4444;--red-dim:rgba(239,68,68,0.12);
  --yellow:#FBBF24;--yellow-dim:rgba(251,191,36,0.12);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.12);
  --t1:#FFFFFF;--t2:#A1A1AA;--t3:#52525B;
  --r:14px;--r2:20px;
  --nav-h:72px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
#bg-canvas-wrap canvas{position:fixed;inset:0;width:100%!important;height:100%!important}

/* ─── SETUP / LOGIN SCREENS ─── */
.auth-screen{position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,8,8,0.97);padding:24px}
.auth-box{width:100%;max-width:380px}
.auth-logo{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;
  background:linear-gradient(135deg,var(--amber),#FDE68A);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{font-size:13px;color:var(--t3);margin-bottom:32px}
.auth-label{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:0.5px;
  text-transform:uppercase;margin-bottom:6px;display:block}
.auth-input{width:100%;background:var(--s2);border:1px solid var(--border2);
  border-radius:var(--r);padding:13px 14px;font-family:'Inter',sans-serif;
  font-size:15px;font-weight:600;color:var(--t1);outline:none;margin-bottom:12px}
.auth-input:focus{border-color:var(--amber)}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--amber),#F97316);
  border:none;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:15px;
  font-weight:700;color:#000;cursor:pointer;margin-bottom:10px;min-height:50px}
.auth-btn-sec{width:100%;padding:12px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  color:var(--t3);cursor:pointer;min-height:44px}
.auth-err{font-size:12px;color:var(--red);margin-bottom:10px;
  background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);
  border-radius:10px;padding:10px 12px;display:none}
.auth-hint{font-size:11px;color:var(--t3);margin-top:16px;line-height:1.5}
.auth-hint a{color:var(--amber);cursor:pointer;text-decoration:none}
.auth-divider{height:1px;background:var(--border);margin:16px 0}

/* ─── LOADING ─── */
#loading-screen{position:fixed;inset:0;z-index:400;background:var(--bg);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-logo{font-size:32px;font-weight:900;
  background:linear-gradient(135deg,var(--amber),#FDE68A);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:pulse-dot 1.5s ease infinite}
.loading-sub{font-size:12px;color:var(--t3)}

/* ─── APP SHELL ─── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1;display:none}
#header{padding:calc(env(safe-area-inset-top,16px) + 6px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:rgba(8,8,8,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
.header-logo{font-size:19px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--amber),#FDE68A);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-meta{font-size:10px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:5px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);
  display:inline-block;transition:background 0.3s,opacity 0.3s}
.month-nav{display:flex;align-items:center;gap:4px}
.month-nav button{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  color:var(--t2);font-size:14px;cursor:pointer;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;min-height:28px}
.month-nav button:active{opacity:0.7}
.month-label{font-size:12px;font-weight:700;color:var(--amber);
  background:var(--amber-dim);border:1px solid rgba(245,158,11,0.3);
  border-radius:8px;padding:4px 10px;white-space:nowrap;min-height:28px;
  display:flex;align-items:center;cursor:pointer}
.header-status{display:flex;align-items:center;gap:5px;flex-shrink:0}
.badge-header{display:flex;align-items:center;gap:4px;border-radius:14px;
  padding:4px 9px;font-size:10px;font-weight:600;white-space:nowrap;min-height:26px}
.badge-crit-h{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);color:var(--red);
  animation:pulse-border 2s ease infinite}
.badge-warn-h{background:var(--yellow-dim);border:1px solid rgba(251,191,36,0.3);color:var(--yellow)}
.badge-ok-h{background:var(--green-dim);border:1px solid rgba(16,185,129,0.25);color:var(--green)}

#main{flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 14px calc(var(--nav-h) + var(--safe-bottom) + 14px);
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
#main::-webkit-scrollbar{display:none}

#nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:rgba(10,10,10,0.97);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;padding:6px 2px;
  color:var(--t3);transition:color 0.18s;position:relative;min-height:44px}
.nav-btn.active{color:var(--amber)}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn .nav-label{font-size:9px;font-weight:600;letter-spacing:0.3px}
.nav-btn.active::before{content:'';position:absolute;top:0;left:50%;
  transform:translateX(-50%);width:28px;height:2px;background:var(--amber);border-radius:0 0 2px 2px}

/* ─── CARDS ─── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px 12px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;right:0;width:50px;height:50px;
  border-radius:50%;transform:translate(18px,-18px);filter:blur(22px)}
.kpi-amber::before{background:var(--amber)}.kpi-green::before{background:var(--green)}
.kpi-red::before{background:var(--red)}.kpi-yellow::before{background:var(--yellow)}
.kpi-label{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:0.6px;
  text-transform:uppercase;margin-bottom:5px}
.kpi-value{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:3px}
.sec-title{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.7px;
  text-transform:uppercase;margin:16px 0 8px}
.alert-banner{border-radius:var(--r2);padding:12px 14px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.alert-crit{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3)}
.alert-warn{background:var(--yellow-dim);border:1px solid rgba(251,191,36,0.3)}
.bar-chart-wrap{background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px;margin-bottom:10px}
.bar-chart-title{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.5px;
  text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.bars{display:flex;gap:4px;align-items:flex-end;height:64px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-val{font-size:7px;font-weight:700}.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height 0.4s ease}
.bar-lbl{font-size:7px;color:var(--t3);text-align:center}
.entry-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border)}
.entry-row:last-child{border-bottom:none}
.entry-ts{font-size:10px;color:var(--t3)}.entry-main{font-size:12px;font-weight:600;color:var(--t1)}
.entry-pct{font-size:15px;font-weight:800}
.field-group{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.field-group-title{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px}
.field-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.field-row:last-child{border-bottom:none}
.field-label{font-size:13px;font-weight:500;color:var(--t2)}
.field-sublabel{font-size:10px;color:var(--amber);margin-top:1px}
.field-input{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);
  padding:8px 10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;
  color:var(--t1);outline:none;width:130px;text-align:right}
.field-input:focus{border-color:var(--amber)}
.dre-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.dre-row:last-child{border-bottom:none}
.dre-row.dre-total{background:rgba(245,158,11,0.06);border-radius:8px;
  padding:10px 12px;margin:4px -12px;border:none}
.dre-row.dre-subtotal{background:rgba(255,255,255,0.03);border-radius:6px;
  padding:8px 10px;margin:2px -10px;border:none}
.dre-label{font-size:13px;color:var(--t2)}
.dre-label.bold{font-weight:700;color:var(--t1)}
.dre-label.sub{font-size:11px;color:var(--t3);padding-left:12px}
.dre-value{font-size:14px;font-weight:700;text-align:right}
.dre-pct{font-size:10px;color:var(--t3);text-align:right;margin-top:1px}
.numpad-display{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);
  padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.numpad-label{font-size:11px;color:var(--t3);font-weight:500}
.numpad-value{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--amber)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.numpad-key{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  height:52px;font-size:17px;font-weight:600;color:var(--t1);cursor:pointer;
  transition:all 0.1s;display:flex;align-items:center;justify-content:center;min-height:44px}
.numpad-key:active{background:var(--s3);transform:scale(0.96)}
.numpad-key.key-zero{grid-column:span 2}.numpad-key.key-del{color:var(--t3)}
.save-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--amber),#F97316);
  border:none;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:15px;
  font-weight:700;color:#000;cursor:pointer;transition:all 0.2s;min-height:52px}
.save-btn:disabled{background:var(--s3);color:var(--t3);cursor:not-allowed}
.save-btn:active:not(:disabled){transform:scale(0.98)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{padding:5px 13px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--s1);color:var(--t3);
  transition:all 0.15s;min-height:32px;display:flex;align-items:center}
.filter-chip.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:7px 5px;text-align:right;color:var(--t3);font-size:9px;
  font-weight:600;letter-spacing:0.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.data-table th:first-child{text-align:left}
.data-table td{padding:8px 5px;border-bottom:1px solid rgba(255,255,255,0.04)}
.data-table td:first-child{font-weight:700;color:var(--t2)}
.data-table td:not(:first-child){text-align:right}
.data-table tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;border-radius:18px;padding:3px 9px;font-size:10px;font-weight:600}
.badge-crit{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
.badge-warn{background:var(--yellow-dim);border:1px solid rgba(251,191,36,0.3);color:var(--yellow)}
.badge-ok{background:var(--green-dim);border:1px solid rgba(16,185,129,0.25);color:var(--green)}
.badge-neutral{background:var(--s3);border:1px solid var(--border);color:var(--t3)}
.account-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.account-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:12px}
.account-name{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.account-input{background:var(--s2);border:1px solid var(--border2);border-radius:10px;
  padding:7px 10px;font-family:'Inter',sans-serif;font-size:16px;font-weight:800;
  color:var(--amber);outline:none;width:100%;text-align:right;margin-top:4px}
.account-input:focus{border-color:var(--amber)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:12px}
.stat-label{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.stat-value{font-size:20px;font-weight:800;line-height:1}
.stat-sub{font-size:10px;color:var(--t3);margin-top:2px}
.action-btn{width:100%;padding:13px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;min-height:48px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.action-btn.green{color:var(--green);border-color:rgba(16,185,129,0.3);background:var(--green-dim)}
.action-btn.red{color:var(--red);border-color:rgba(239,68,68,0.3);background:var(--red-dim)}
.action-btn:active{opacity:0.8}
.month-tag{display:inline-flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--border);border-radius:18px;padding:4px 12px;
  font-size:11px;font-weight:600;color:var(--t2);margin-bottom:14px}
.month-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse-dot 2s ease infinite}
.empty{text-align:center;padding:32px 16px;color:var(--t3)}
.empty-icon{font-size:36px;margin-bottom:10px}.empty-text{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:3px}
.empty-sub{font-size:11px;color:var(--t3)}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);left:50%;
  transform:translateX(-50%) translateY(18px);background:var(--s3);border:1px solid var(--border2);
  border-radius:18px;padding:9px 18px;font-size:12px;font-weight:600;color:var(--t1);
  white-space:nowrap;z-index:600;opacity:0;transition:all 0.25s ease;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spark{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 3px rgba(239,68,68,0.2)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.screen{animation:fadeUp 0.22s ease}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}
button:focus:not(:focus-visible){outline:none}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.25s}
#modal-overlay.open{opacity:1;pointer-events:all}
#modal-box{background:var(--s1);border:1px solid var(--border2);
  border-radius:var(--r2) var(--r2) 0 0;padding:20px 16px;
  padding-bottom:calc(20px + var(--safe-bottom));width:100%;max-width:500px;
  transform:translateY(20px);transition:transform 0.25s}
#modal-overlay.open #modal-box{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--t3);margin-bottom:18px}
.modal-input{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);
  padding:12px 14px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;
  color:var(--t1);outline:none;width:100%;margin-bottom:12px}
.modal-input:focus{border-color:var(--amber)}
.modal-row{display:flex;gap:8px}
.modal-btn{flex:1;padding:13px;border:none;border-radius:var(--r);font-family:'Inter',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;min-height:48px}
.modal-btn-cancel{background:var(--s2);color:var(--t3);border:1px solid var(--border)}
.modal-btn-ok{background:linear-gradient(135deg,var(--amber),#F97316);color:#000}
</style>
</head>
<body>

<div id="bg-canvas-wrap" aria-hidden="true"
  style="position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3"></div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo">CMV Pro</div>
  <div class="loading-sub">Carregando...</div>
</div>

<!-- SETUP SCREEN (first time — configure Supabase) -->
<div id="setup-screen" class="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">CMV Pro</div>
    <div class="auth-sub">Configuração inicial — conecte ao seu Supabase</div>
    <label class="auth-label">URL do projeto</label>
    <input class="auth-input" id="sb-url" type="url"
      placeholder="https://xxxxxxxxxxxx.supabase.co" autocomplete="off">
    <label class="auth-label">Anon Key</label>
    <input class="auth-input" id="sb-key" type="text"
      placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." autocomplete="off">
    <div class="auth-err" id="setup-err"></div>
    <button class="auth-btn" onclick="saveSetup()">Conectar ✓</button>
    <div class="auth-hint">
      Crie seu projeto gratuito em <a href="https://supabase.com" target="_blank">supabase.com</a><br>
      Depois vá em Project Settings → API para pegar a URL e a anon key.
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">CMV Pro</div>
    <div class="auth-sub" id="login-subtitle">Entre com sua conta</div>
    <div class="auth-err" id="login-err"></div>
    <label class="auth-label">Email</label>
    <input class="auth-input" id="login-email" type="email" placeholder="leo@restaurante.com"
      autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="auth-label">Senha</label>
    <input class="auth-input" id="login-password" type="password" placeholder="••••••••"
      autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">

    saldo_pagbank:0,saldo_santander:0,saldo_bradesco:0,
    saldo_stone:0,saldo_ghost:0,saldo_dinheiro:0,
    dayLogs:[],
  };

function calcDRE(m){
  const logFat=m.dayLogs.reduce((s,d)=>s+d.fat,0);
  const fat=logFat>0?logFat:(m.fat_manual||0);
  const cmv_carne=logFat>0?m.dayLogs.reduce((s,d)=>s+(d.cmv_carne||0),0):(m.cmv_carne_manual||0);
  const cmv_carbo=logFat>0?m.dayLogs.reduce((s,d)=>s+(d.cmv_carbo||0),0):(m.cmv_carbo_manual||0);
  const cmv_outros=logFat>0?m.dayLogs.reduce((s,d)=>s+(d.cmv_outros||0),0):(m.cmv_outros_manual||0);
  const cmv=cmv_carne+cmv_carbo+cmv_outros;
  const cmv_pct=fat>0?(cmv/fat*100):0;
  const desp_adm=['adm_energia','adm_agua','adm_gas','adm_balanca','adm_sistema',
    'adm_internet','adm_contador','adm_advogado','adm_detetizacao','adm_lavanderia',
    'adm_seguro','adm_odontoprev','adm_anotaai','adm_outros'].reduce((s,k)=>s+(m[k]||0),0);
  const margem_bruta=fat-cmv-(m.impostos||0)-(m.cartoes||0);
  const lucro_bruto=margem_bruta-(m.pessoal||0)-(m.motoboy||0)-(m.encargos||0)
    -desp_adm-(m.desp_financ||0)-(m.agua_luz_gas||0)-(m.manutencao||0)-(m.aluguel||0);
  const deducoes=(m.investimentos||0)+(m.financiamentos||0)+(m.marketing||0)+(m.consorcio||0)+(m.retirada||0);
  const lucro_liq=lucro_bruto-deducoes;
  const saldo_total=['saldo_pagbank','saldo_santander','saldo_bradesco','saldo_stone','saldo_ghost','saldo_dinheiro']
    .reduce((s,k)=>s+(m[k]||0),0);
  return {
    fat,cmv,cmv_carne,cmv_carbo,cmv_outros,cmv_pct,
    margem_bruta,margem_pct:fat>0?(margem_bruta/fat*100):0,
    lucro_bruto,lucro_liq,lucro_pct:fat>0?(lucro_liq/fat*100):0,
    desp_adm,deducoes,saldo_total,
    pessoal_pct:fat>0?(m.pessoal||0)/fat*100:0,
    motoboy_pct:fat>0?(m.motoboy||0)/fat*100:0,
    marketing_pct:fat>0?(m.marketing||0)/fat*100:0,
    agua_luz_pct:fat>0?(m.agua_luz_gas||0)/fat*100:0,
  };
}

// ══════════════════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════════════════
function cacheLocal(){
  localStorage.setItem('cmvpro_cache', JSON.stringify({
    months:state.months, activeIdx:state.activeIdx, thresholds:state.thresholds
  }));
}

function loadCache(){
  const c=JSON.parse(localStorage.getItem('cmvpro_cache')||'null');
  if(c && c.months && c.months.length>0){
    state.months=c.months;
    state.activeIdx=Math.min(c.activeIdx||0,c.months.length-1);
    state.thresholds=c.thresholds||deepCopy(DEFAULT_TH);
    return true;
  }
  return false;
}

function seedInitial(){
  state.months=SEED_HISTORY.map(seedToMonth);
  state.activeIdx=state.months.length-1;
  state.thresholds=deepCopy(DEFAULT_TH);
}

let _saveTimer=null;
function saveData(){
  cacheLocal();
  setSyncDot('syncing');
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(saveSupabase,1500);
}

async function saveSupabase(){
  if(!db) return;
  try {
    const {data:{user}}=await db.auth.getUser();
    if(!user) return;
    const {error}=await db.from('restaurant_data').upsert({
      user_id:user.id,
      months:state.months,
      active_idx:state.activeIdx,
      thresholds:state.thresholds,
      updated_at:new Date().toISOString()
    },{onConflict:'user_id'});
    setSyncDot(error?'error':'synced');
    if(error) console.error('Supabase save error:',error);
  } catch(e){ setSyncDot('error'); }
}

async function loadSupabase(){
  if(!db) return false;
  try {
    const {data,error}=await db.from('restaurant_data').select('*').single();
    if(data && !error){
      state.months=data.months&&data.months.length>0?data.months:SEED_HISTORY.map(seedToMonth);
      state.activeIdx=Math.min(data.active_idx||0,state.months.length-1);
      state.thresholds=data.thresholds||deepCopy(DEFAULT_TH);
      cacheLocal();
      return true;
    }
    // No data yet — first login, seed and save
    seedInitial();
    await saveSupabase();
    cacheLocal();
    return true;
  } catch(e){
    console.error('Supabase load error:',e);
    return false;
  }
}

function saveSetup(){
  const url=document.getElementById('sb-url').value.trim();
  const key=document.getElementById('sb-key').value.trim();
  const err=document.getElementById('setup-err');
  if(!url||!key){err.textContent='Preencha os dois campos';err.style.display='block';return;}
  if(!url.startsWith('https://')){err.textContent='URL inválida — deve começar com https://';err.style.display='block';return;}
  localStorage.setItem('cmvpro_sb_url',url);
  localStorage.setItem('cmvpro_sb_key',key);
  err.style.display='none';
  if(initDB()) showLoginScreen();
  else{err.textContent='Erro ao conectar — verifique as credenciais';err.style.display='block';}
}

let authMode='login';
function toggleAuthMode(){
  authMode=authMode==='login'?'signup':'login';
  document.getElementById('login-subtitle').textContent=authMode==='login'?'Entre com sua conta':'Criar conta nova';
  document.getElementById('login-btn').textContent=authMode==='login'?'Entrar →':'Criar conta ✓';
  document.getElementById('toggle-mode-btn').textContent=authMode==='login'?'Criar conta nova':'Já tenho conta';
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!email||!password){err.textContent='Preencha email e senha';err.style.display='block';return;}
  if(!db){err.textContent='Supabase não configurado';err.style.display='block';return;}
  showLoading();
  try {
    let result;
    if(authMode==='signup'){
      result=await db.auth.signUp({email,password});
      if(result.error) throw result.error;
      if(result.data.user && !result.data.session){
        hideLoading(); showLoginScreen();
        toast('✅ Conta criada! Verifique seu email para confirmar.');
        return;
      }
    } else {
      result=await db.auth.signInWithPassword({email,password});
      if(result.error) throw result.error;
    }
    // Success — load data and show app
    const loaded=await loadSupabase();
    if(!loaded && !loadCache()) seedInitial();
    showApp();
    renderScreen();
  } catch(e){
    hideLoading(); showLoginScreen();
    err.textContent=e.message||'Erro de autenticação'; err.style.display='block';
  }
}

async function doLogout(){
  if(!confirm('Sair do CMV Pro?')) return;
  if(db) await db.auth.signOut();
  showLoginScreen();
}

function alertLevel(val,th){
  if(val==null||isNaN(val)) return 'none';
  if(th.rev) return val<=th.crit?'crit':val<=th.warn?'warn':'ok';
  return val>=th.crit?'crit':val>=th.warn?'warn':'ok';
}
const AL_COLOR={ok:'#10B981',warn:'#FBBF24',crit:'#EF4444',none:'#52525B'};

function getAlerts(dre){
  return Object.entries(state.thresholds).map(([k,th])=>({k,th,val:dre[k],level:alertLevel(dre[k],th)}));
}

function navigate(page){
  state.page=page;
  if(page!=='lancamento'){
    state.activeNumField=null;state.numInput='';
    state.fatInput='';state.cmvCarneInput='';state.cmvCarboInput='';
    state.cmvOutrosInput='';state.despDiaInput='';state.motoboyDiaInput='';
  }
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.removeAttribute('aria-current');});
  const btn=document.getElementById('nav-'+page);
  if(btn){btn.classList.add('active');btn.setAttribute('aria-current','page');}
  renderScreen();
  document.getElementById('main').scrollTop=0;
}

function prevMonth(){
  if(state.activeIdx>0){state.activeIdx--;saveData();renderScreen();}
  else toast('Primeiro mês disponível');
}
function nextMonth(){
  if(state.activeIdx<state.months.length-1){state.activeIdx++;saveData();renderScreen();}
  else toast('Último mês — toque no mês para criar novo');
}

function openNewMonthModal(){
  const d=now(),months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('modal-month-name').value=months[d.getMonth()]+'/'+d.getFullYear();
  document.getElementById('modal-overlay').classList.add('open');

}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))

}
function createNewMonth(){
  const name=document.getElementById('modal-month-name').value.trim();
  if(!name){toast('Digite o nome do mês');return;}
  if(state.months.find(m=>m.label===name)){toast('Este mês já existe');return;}
  state.months.push(blankMonth(name));
  state.activeIdx=state.months.length-1;
  saveData();closeModal();renderScreen();
  toast('✅ Mês '+name+' criado!');

// ══════════════════════════════════════════════════════════════
function sparkSVG(data,color){
  if(!data||data.length<2) return '';
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const W=70,H=32;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-mn)/rng)*(H-6)-3}`).join(' ');
  const last=pts.split(' ').at(-1).split(',');
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/><circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${color}"/></svg>`;
}

  }).join('');

    <div class="field-group"><div class="field-group-title">Dados do dia — ${activeMonth()?.label||''}</div>${fieldBtns}</div>

function selectField(id){
  const fieldMap={fat:'fatInput',carne:'cmvCarneInput',carbo:'cmvCarboInput',outros:'cmvOutrosInput',desp:'despDiaInput',motoboy:'motoboyDiaInput'};
  if(state.activeNumField===id){state.activeNumField=null;state.numInput='';}
  else{state.activeNumField=id;state.numInput=state[fieldMap[id]]||'';}
  const el=document.getElementById('screen-content');renderLancamento(el);
}
function numKey(k){
  if(state.numInput.length>=9)return;
  if(k==='.'&&state.numInput.includes('.'))return;
  state.numInput+=k;
  document.getElementById('screen-content')&&renderLancamento(document.getElementById('screen-content'));
}
function numDel(){
  state.numInput=state.numInput.slice(0,-1);
  document.getElementById('screen-content')&&renderLancamento(document.getElementById('screen-content'));
}
function confirmField(){
  const fieldMap={fat:'fatInput',carne:'cmvCarneInput',carbo:'cmvCarboInput',outros:'cmvOutrosInput',desp:'despDiaInput',motoboy:'motoboyDiaInput'};
  if(state.activeNumField) state[fieldMap[state.activeNumField]]=state.numInput;
  state.activeNumField=null;state.numInput='';
  document.getElementById('screen-content')&&renderLancamento(document.getElementById('screen-content'));
}
function saveDayLog(){
  const fat=parseFloat(state.fatInput)||0;
  const cmv_carne=parseFloat(state.cmvCarneInput)||0;
  const cmv_carbo=parseFloat(state.cmvCarboInput)||0;
  const cmv_outros=parseFloat(state.cmvOutrosInput)||0;
  if(!fat&&!(cmv_carne+cmv_carbo+cmv_outros)){toast('Preencha pelo menos faturamento ou CMV');return;}
  const d=now();
  activeMonth().dayLogs=[{id:Date.now(),date:dateStr(d)+' '+timeStr(d),fat,
    cmv_carne,cmv_carbo,cmv_outros,
    despesas:parseFloat(state.despDiaInput)||0,
    motoboy:parseFloat(state.motoboyDiaInput)||0},
    ...(activeMonth().dayLogs||[])];
  state.fatInput='';state.cmvCarneInput='';state.cmvCarboInput='';
  state.cmvOutrosInput='';state.despDiaInput='';state.motoboyDiaInput='';
  state.activeNumField=null;state.numInput='';
  saveData();toast('✅ Lançamento salvo!');navigate('dashboard');
}

    <button class="action-btn green" onclick="exportExcel()"><span>📊</span> Exportar Excel</button>`;

  // DRE inline editor
  let _dreKey=null;
  window.dreEdit=function(key,label){
    _dreKey=key;
    document.getElementById('dre-overlay-title').textContent='Editar: '+label;
    document.getElementById('dre-overlay-input').value=m[key]||0;
    document.getElementById('dre-overlay').style.display='flex';
    setTimeout(()=>document.getElementById('dre-overlay-input').focus(),100);
  };
  window.dreClose=function(){ document.getElementById('dre-overlay').style.display='none'; };
  window.dreSave=function(){
    const val=parseFloat(document.getElementById('dre-overlay-input').value)||0;
    if(_dreKey){ m[_dreKey]=val; saveData(); }
    window.dreClose(); navigate('dre'); toast('✅ Salvo');
  };
  document.getElementById('dre-overlay-input')?.addEventListener('keydown',e=>{if(e.key==='Enter')window.dreSave();});
}

  const m=activeMonth();
  if(!m){el.innerHTML=`<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">Nenhum mês</div></div>`;return;}

  const ADM=[
    {key:'adm_energia',label:'⚡ Energia'},{key:'adm_agua',label:'💧 Água'},{key:'adm_gas',label:'🔥 Gás'},
    {key:'adm_balanca',label:'⚖️ Balança'},{key:'adm_sistema',label:'💻 Sistema'},{key:'adm_internet',label:'🌐 Internet'},
    {key:'adm_contador',label:'📒 Contador'},{key:'adm_advogado',label:'⚖️ Advogado'},{key:'adm_detetizacao',label:'🦟 Detetização'},
    {key:'adm_lavanderia',label:'👕 Lavanderia'},{key:'adm_seguro',label:'🛡 Seguro'},{key:'adm_odontoprev',label:'🦷 Odontoprev'},

      <div class="field-label" style="font-size:13px">${item.label}</div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:12px;color:var(--t3)">R$</span>
        <input class="field-input" type="number" inputmode="decimal" step="0.01"
          value="${m[item.key]||''}" placeholder="0"
          onchange="updateField('${item.key}',this.value)">

        value="${m[acc.key]||''}" placeholder="0,00"
        onchange="updateField('${acc.key}',this.value)"
        style="color:${acc.color}">
    </div>`).join('');

  // Threshold config
  const thRows=Object.entries(state.thresholds).map(([k,th])=>`
    <div class="field-row">
      <div><div class="field-label" style="font-size:12px">${th.label}</div>
        <div style="font-size:10px;color:var(--t3)">⚠ ${th.warn}% / 🚨 ${th.crit}% ${th.rev?'(alerta quando cai)':''}</div></div>
      <div style="display:flex;gap:6px">

          onchange="updateThreshold('${k}','warn',this.value)">

function updateField(key,val){
  const m=activeMonth();if(!m)return;
  m[key]=parseFloat(val)||0;
  saveData();renderHeader();
}
function updateThreshold(k,type,val){
  const v=parseFloat(val);if(isNaN(v))return;
  state.thresholds[k][type]=v;
  saveData();renderHeader();
}

// ══════════════════════════════════════════════════════════════
//  HISTÓRICO
// ══════════════════════════════════════════════════════════════
function renderHistorico(el){
  const f=state.histFilter;
  const all=state.months.map((m,i)=>({m,dre:calcDRE(m),i}));
  const filtered=all.filter(({dre})=>f==='bom'?dre.lucro_pct>=12:f==='ruim'?dre.lucro_pct<8:true);
  const allDREs=all.map(x=>x.dre);
  const bestLucro=Math.max(...allDREs.map(d=>d.lucro_pct));
  const worstCmv=Math.max(...allDREs.map(d=>d.cmv_pct));
  const biggestFat=Math.max(...allDREs.map(d=>d.fat));
  const last6=allDREs.slice(-6);
  const avg6cmv=last6.length>0?+(last6.reduce((s,d)=>s+d.cmv_pct,0)/last6.length).toFixed(1):0;
  const rows=[...filtered].reverse().map(({m,dre,i})=>{
    const cmvC=dre.cmv_pct>=38?'var(--red)':dre.cmv_pct>=33?'var(--yellow)':'var(--green)';
    const lucroC=dre.lucro_pct<8?'var(--red)':dre.lucro_pct>=12?'var(--green)':'var(--yellow)';
    return `<tr onclick="state.activeIdx=${i};navigate('dashboard')" style="cursor:pointer"><td style="color:var(--t1);font-weight:700;font-size:11px;white-space:nowrap;padding-left:14px">${m.label}</td><td style="color:var(--t3);font-size:11px">${BrK(dre.fat)}</td><td style="font-weight:700;color:${cmvC}">${dre.cmv_pct.toFixed(1)}%</td><td style="color:var(--t3)">${dre.margem_pct.toFixed(0)}%</td><td style="font-weight:700;color:${lucroC}">${dre.lucro_pct.toFixed(1)}%</td></tr>`;
  }).join('');
  el.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Melhor lucro</div><div class="stat-value" style="color:var(--green)">${bestLucro.toFixed(1)}%</div><div class="stat-sub">${all.find(x=>x.dre.lucro_pct===bestLucro)?.m.label||'—'}</div></div>
      <div class="stat-card"><div class="stat-label">Pior CMV</div><div class="stat-value" style="color:var(--red)">${worstCmv.toFixed(1)}%</div><div class="stat-sub">${all.find(x=>x.dre.cmv_pct===worstCmv)?.m.label||'—'}</div></div>
      <div class="stat-card"><div class="stat-label">Maior fat.</div><div class="stat-value" style="color:var(--amber);font-size:16px">${BrK(biggestFat)}</div><div class="stat-sub">${all.find(x=>x.dre.fat===biggestFat)?.m.label||'—'}</div></div>
      <div class="stat-card"><div class="stat-label">CMV médio 6m</div><div class="stat-value" style="color:${avg6cmv>=38?'var(--red)':avg6cmv>=33?'var(--yellow)':'var(--green)'}">${avg6cmv}%</div><div style="margin-top:6px">${sparkSVG(allDREs.slice(-12).map(d=>d.cmv_pct),'var(--amber)')}</div></div>
    </div>
    <div class="filter-row">
      <button class="filter-chip${f==='todos'?' active':''}" onclick="setHistFilter('todos')">Todos (${all.length})</button>
      <button class="filter-chip${f==='bom'?' active':''}" onclick="setHistFilter('bom')">Lucro ≥12%</button>
      <button class="filter-chip${f==='ruim'?' active':''}" onclick="setHistFilter('ruim')">Lucro &lt;8%</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table class="data-table"><thead><tr><th style="text-align:left;padding-left:14px">Mês</th><th>Faturamento</th><th>CMV%</th><th>Margem%</th><th>Lucro%</th></tr></thead><tbody>${rows}</tbody></table>
    </div></div>`;
}
function setHistFilter(f){state.histFilter=f;renderHistorico(document.getElementById('screen-content'));}

function exportExcel(){
  try {
    const m=activeMonth();if(!m){toast('Nenhum mês para exportar');return;}
    const dre=calcDRE(m);const wb=XLSX.utils.book_new();
    const p=(val,fat)=>fat>0?((val||0)/fat*100).toFixed(1)+'%':'—';
    const dreData=[
      ['DRE — '+m.label,'R$','% Fat'],
      ['FATURAMENTO',dre.fat,'100%'],['CMV Carne',dre.cmv_carne,p(dre.cmv_carne,dre.fat)],
      ['CMV Carbo',dre.cmv_carbo,p(dre.cmv_carbo,dre.fat)],['CMV Outros',dre.cmv_outros,p(dre.cmv_outros,dre.fat)],
      ['(=) Total CMV',dre.cmv,p(dre.cmv,dre.fat)],
      ['Impostos',m.impostos||0,p(m.impostos,dre.fat)],['Cartões',m.cartoes||0,p(m.cartoes,dre.fat)],
      ['(=) MARGEM BRUTA',dre.margem_bruta,p(dre.margem_bruta,dre.fat)],
      ['Pessoal',m.pessoal||0,p(m.pessoal,dre.fat)],['Motoboy',m.motoboy||0,p(m.motoboy,dre.fat)],
      ['Encargos',m.encargos||0,p(m.encargos,dre.fat)],['Desp. Adm.',dre.desp_adm,p(dre.desp_adm,dre.fat)],
      ['Desp. Financeira',m.desp_financ||0,p(m.desp_financ,dre.fat)],
      ['Água+Luz+Gás',m.agua_luz_gas||0,p(m.agua_luz_gas,dre.fat)],
      ['Manutenção',m.manutencao||0,p(m.manutencao,dre.fat)],['Aluguel/IPTU',m.aluguel||0,p(m.aluguel,dre.fat)],
      ['(=) LUCRO BRUTO',dre.lucro_bruto,p(dre.lucro_bruto,dre.fat)],
      ['Investimentos',m.investimentos||0,p(m.investimentos,dre.fat)],
      ['Financiamentos',m.financiamentos||0,p(m.financiamentos,dre.fat)],
      ['Marketing',m.marketing||0,p(m.marketing,dre.fat)],['Consórcio',m.consorcio||0,p(m.consorcio,dre.fat)],
      ['Retirada Sócio',m.retirada||0,p(m.retirada,dre.fat)],
      ['(=) LUCRO LÍQUIDO',dre.lucro_liq,p(dre.lucro_liq,dre.fat)],
    ];
    const wsDRE=XLSX.utils.aoa_to_sheet(dreData);wsDRE['!cols']=[{wch:28},{wch:16},{wch:10}];
    XLSX.utils.book_append_sheet(wb,wsDRE,'DRE');
    const admData=[['Despesas Adm — '+m.label,'R$'],
      ...['energia','agua','gas','balanca','sistema','internet','contador','advogado',
          'detetizacao','lavanderia','seguro','odontoprev','anotaai','outros']
        .map(k=>['adm_'+k,m['adm_'+k]||0]).map(([k,v])=>[k.replace('adm_','').charAt(0).toUpperCase()+k.replace('adm_','').slice(1),v]),
      ['TOTAL',dre.desp_adm]];
    const wsAdm=XLSX.utils.aoa_to_sheet(admData);wsAdm['!cols']=[{wch:22},{wch:16}];
    XLSX.utils.book_append_sheet(wb,wsAdm,'Desp Adm');
    const saldoData=[['Saldo em Conta — '+m.label,'R$'],
      ['PagBank',m.saldo_pagbank||0],['Santander',m.saldo_santander||0],['Bradesco',m.saldo_bradesco||0],
      ['Stone',m.saldo_stone||0],['Ghost/PicPay',m.saldo_ghost||0],['Dinheiro',m.saldo_dinheiro||0],
      ['TOTAL',dre.saldo_total]];
    const wsSaldo=XLSX.utils.aoa_to_sheet(saldoData);wsSaldo['!cols']=[{wch:20},{wch:16}];
    XLSX.utils.book_append_sheet(wb,wsSaldo,'Saldos');
    if(m.dayLogs?.length>0){
      const logData=[['Data','Faturamento','CMV Carne','CMV Carbo','CMV Outros','CMV Total','CMV%','Despesas','Motoboy']];
      m.dayLogs.forEach(l=>{const t=(l.cmv_carne||0)+(l.cmv_carbo||0)+(l.cmv_outros||0);
        logData.push([l.date,l.fat,l.cmv_carne||0,l.cmv_carbo||0,l.cmv_outros||0,t,l.fat>0?(t/l.fat*100).toFixed(1)+'%':'—',l.despesas||0,l.motoboy||0]);});
      const wsLog=XLSX.utils.aoa_to_sheet(logData);wsLog['!cols']=[{wch:22},{wch:14},{wch:12},{wch:12},{wch:12},{wch:12},{wch:8},{wch:12},{wch:12}];
      XLSX.utils.book_append_sheet(wb,wsLog,'Lançamentos');
    }
    const histData=[['Mês','Faturamento','CMV','CMV%','Margem%','Lucro Líq.','Lucro%']];
    state.months.forEach(mon=>{const d=calcDRE(mon);histData.push([mon.label,d.fat,d.cmv,d.cmv_pct.toFixed(1)+'%',d.margem_pct.toFixed(1)+'%',d.lucro_liq,d.lucro_pct.toFixed(1)+'%']);});
    const wsHist=XLSX.utils.aoa_to_sheet(histData);wsHist['!cols']=[{wch:12},{wch:14},{wch:12},{wch:8},{wch:10},{wch:14},{wch:8}];
    XLSX.utils.book_append_sheet(wb,wsHist,'Histórico');
    XLSX.writeFile(wb,'CMV_'+m.label.replace('/','_')+'.xlsx');
    toast('📊 Planilha exportada!');
  } catch(e){ toast('Erro: '+e.message); }
}

// ══════════════════════════════════════════════════════════════
//  P5.JS — THERMAL FLOW
// ══════════════════════════════════════════════════════════════
new p5(function(p){
  let particles=[],W,H,statusColor=[245,158,11];
  p.setup=function(){
    let cnv=p.createCanvas(window.innerWidth,window.innerHeight);
    cnv.parent('bg-canvas-wrap');p.frameRate(30);p.noStroke();initParticles();
  };
  function updateColor(){
    if(!state.thresholds||!state.months.length){statusColor=[245,158,11];return;}
    const m=activeMonth();if(!m){return;}
    const dre=calcDRE(m);
    const th=state.thresholds.cmv_pct;
    const level=alertLevel(dre.cmv_pct,th);
    statusColor=level==='crit'?[239,68,68]:level==='warn'?[251,191,36]:[16,185,129];
  }
  function initParticles(){
    particles=[];
    const count=Math.floor((W||window.innerWidth)/9)||80;
    for(let i=0;i<count;i++) particles.push({x:p.random(W||800),y:p.random(H||600),speed:p.random(0.3,1.2),size:p.random(1,2.5),alpha:p.random(18,55),offset:p.random(1000)});
  }
  p.draw=function(){
    p.clear();W=p.width;H=p.height;updateColor();
    const [r,g,b]=statusColor;
    for(let pt of particles){
      const n=p.noise(pt.x*0.003,pt.y*0.003+p.frameCount*0.0015,pt.offset);
      const angle=n*p.TWO_PI*2;
      pt.x+=p.cos(angle)*pt.speed*0.5;pt.y+=pt.speed*0.6;
      if(pt.y>H+5)pt.y=-5;if(pt.x<0)pt.x=W;if(pt.x>W)pt.x=0;
      p.fill(r,g,b,pt.alpha);p.ellipse(pt.x,pt.y,pt.size,pt.size*2.5);
    }
  };
  p.windowResized=function(){p.resizeCanvas(window.innerWidth,window.innerHeight);initParticles();};
});

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
(async function init(){
  showLoading();
  // 1. Try to init Supabase from saved config
  const dbReady=initDB();
  if(!dbReady){
    // No config saved — show setup screen
    showSetup();
    return;
  }
  // 2. Check existing session
  const {data:{session}}=await db.auth.getSession();
  if(!session){
    // No session — show login
    showLoginScreen();
    return;
  }
  // 3. Load data from Supabase (or cache if offline)
  const loaded=await loadSupabase();
  if(!loaded){
    if(!loadCache()) seedInitial();
    toast('📶 Usando dados locais');
  }
  // 4. Show app
  showApp();
  document.getElementById('header-date-text').textContent=
    now().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'}).replace(/^\w/,c=>c.toUpperCase());
  renderScreen();

  // 5. Listen for auth changes
  db.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT') showLoginScreen();
  });
})();
</script>
